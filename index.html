<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Upgrade OS 語言升維作業系統</title>
<style>
:root {
  --navy:#1B2A4A; --gold:#C9A84C; --teal:#2E8B8B;
  --white:#FFFFFF; --g50:#F5F7FA; --g100:#E8ECF0;
  --g200:#C8D0DB; --g500:#6B7A90;
  --r:12px; --sh:0 2px 12px rgba(27,42,74,.10);
  --shl:0 8px 32px rgba(27,42,74,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;background:var(--white);color:var(--navy);min-height:100vh;}
.hd{background:var(--navy);color:#fff;padding:22px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.hd-t{font-size:26px;font-weight:800;letter-spacing:1px;}
.hd-t span{color:var(--gold);}
.hd-s{font-size:13px;color:var(--g200);margin-top:3px;}
.home{padding:36px 28px;}
.hi{text-align:center;margin-bottom:36px;}
.hi h2{font-size:28px;color:var(--navy);margin-bottom:8px;}
.hi p{font-size:15px;color:var(--g500);}
.flow-ban{background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;padding:18px 28px;border-radius:var(--r);text-align:center;margin-bottom:36px;font-size:16px;font-weight:700;letter-spacing:1px;}
.flow-ban .ar{color:var(--gold);margin:0 6px;}
.flow-ban .sub{font-size:13px;font-weight:400;color:#a8c0d8;margin-top:6px;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}
.mc{background:#fff;border:2px solid var(--g100);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--gold);}
.mc:hover{border-color:var(--gold);box-shadow:var(--shl);transform:translateY(-2px);}
.mc-num{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.mc-zh{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:3px;}
.mc-en{font-size:12px;color:var(--teal);font-style:italic;margin-bottom:10px;}
.mc-desc{font-size:13px;color:var(--g500);line-height:1.6;}
.mc-tag{display:inline-block;margin-top:10px;padding:3px 10px;background:var(--g50);border-radius:20px;font-size:11px;color:var(--teal);font-weight:600;}
.mc-tag.ai{background:#FFF3E0;color:#E65100;}
.ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(27,42,74,.72);z-index:100;overflow-y:auto;}
.ov.on{display:flex;justify-content:center;padding:36px 16px;}
.panel{background:#fff;border-radius:16px;width:100%;max-width:880px;padding:36px;position:relative;height:fit-content;}
.pcl{position:absolute;top:18px;right:20px;font-size:26px;cursor:pointer;color:var(--g500);background:none;border:none;line-height:1;}
.ph{border-bottom:3px solid var(--gold);padding-bottom:18px;margin-bottom:24px;}
.ph-num{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:3px;}
.ph-zh{font-size:26px;font-weight:800;margin:5px 0 3px;}
.ph-en{font-size:15px;color:var(--teal);font-style:italic;}
.tts{display:inline-flex;align-items:center;gap:5px;background:var(--teal);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;margin:5px 3px;transition:background .2s;font-family:inherit;}
.tts:hover{background:#1a6b6b;}
.tts.sp{background:var(--gold);color:var(--navy);}
.ex-item{border:1px solid var(--g100);border-radius:10px;margin-bottom:9px;overflow:hidden;}
.ex-hd{padding:13px 17px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--g50);font-weight:700;font-size:14px;user-select:none;}
.ex-hd:hover{background:var(--g100);}
.ex-ar{transition:transform .2s;font-size:11px;color:var(--gold);}
.ex-item.op .ex-ar{transform:rotate(90deg);}
.ex-bd{display:none;padding:16px;border-top:1px solid var(--g100);}
.ex-item.op .ex-bd{display:block;}
.ai-box{background:var(--g50);border-radius:12px;padding:22px;margin-bottom:22px;}
.ai-box label{display:block;font-weight:700;font-size:14px;margin-bottom:9px;}
.ai-box textarea{width:100%;min-height:76px;padding:11px;border:2px solid var(--g100);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;}
.ai-box textarea:focus{outline:none;border-color:var(--teal);}
.ai-btn{margin-top:11px;background:var(--navy);color:#fff;border:none;padding:11px 26px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit;}
.ai-btn:hover{background:var(--teal);}
.ai-btn:disabled{background:var(--g200);cursor:not-allowed;}
.ai-res{background:#fff;border:2px solid var(--teal);border-radius:12px;padding:22px;margin-top:18px;display:none;}
.ai-res.on{display:block;}
.ai-res h4{color:var(--teal);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.dots{display:inline-flex;gap:5px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:bnc 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bnc{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.dcell{background:var(--g50);border-radius:8px;padding:13px;}
.dcell .lb{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.dcell .vl{font-size:13px;line-height:1.6;}
.bl-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.bl-lo{background:#FFE0E0;color:#C62828;padding:5px 13px;border-radius:20px;font-size:12px;}
.bl-hi{background:#E0F4E0;color:#1B5E20;padding:5px 13px;border-radius:20px;font-size:12px;}
.fcrd{background:var(--navy);color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:9px;display:flex;align-items:flex-start;gap:14px;}
.fm{font-size:17px;font-weight:800;color:var(--gold);white-space:nowrap;min-width:200px;}
.fe{font-size:13px;line-height:1.7;color:#D0D9E8;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-top:14px;}
.cit{background:var(--g50);border-left:4px solid var(--teal);padding:13px 15px;border-radius:0 8px 8px 0;cursor:pointer;}
.cit:hover{background:var(--g100);}
.cit .cz{font-weight:700;font-size:14px;}
.cit .ce{font-size:11px;color:var(--teal);margin-top:3px;}
.cit .cd{display:none;font-size:12px;color:var(--g500);margin-top:7px;line-height:1.5;}
.cit.op .cd{display:block;}
.fst{display:flex;flex-direction:column;gap:0;}
.fst-row{display:flex;align-items:flex-start;gap:14px;}
.fst-line{display:flex;flex-direction:column;align-items:center;}
.fdot{width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fcon{width:2px;flex:1;min-height:18px;background:var(--g100);margin:3px 0;}
.fcnt{padding-bottom:18px;flex:1;}
.fcnt strong{color:var(--navy);font-size:15px;}
.fcnt p{font-size:13px;color:var(--g500);margin-top:3px;line-height:1.6;}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:13px;margin-top:14px;}
.wc{border-radius:10px;padding:16px;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.wc:hover{border-color:var(--gold);}
.wc .wi{font-size:26px;margin-bottom:7px;}
.wc .wz{font-size:15px;font-weight:800;}
.wc .we{font-size:11px;font-style:italic;margin-top:2px;}
.wc .wd{display:none;font-size:12px;margin-top:9px;line-height:1.7;}
.wc.op .wd{display:block;}
.lvl-list{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
.lv-item{display:flex;gap:11px;align-items:flex-start;cursor:pointer;}
.lv-badge{min-width:46px;text-align:center;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;}
.lv-c{flex:1;}
.lv-z{font-size:14px;font-weight:700;}
.lv-e{font-size:12px;color:var(--teal);margin-top:2px;font-style:italic;}
.lv-ex{display:none;font-size:12px;color:var(--g500);margin-top:7px;line-height:1.6;}
.lv-item.op .lv-ex{display:block;}
.dcrd{background:linear-gradient(135deg,var(--navy),#2A4080);color:#fff;border-radius:14px;padding:26px;margin-bottom:14px;}
.dcrd .dl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:11px;}
.dcrd .dz{font-size:20px;font-weight:800;line-height:1.5;margin-bottom:8px;}
.dcrd .de{font-size:14px;color:#A8C0D8;font-style:italic;line-height:1.5;}
.sim-br{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;}
.sb{border-radius:12px;padding:20px;}
.sb.old{background:#FFF0F0;border:2px solid #FFCDD2;}
.sb.nw{background:#F0FFF4;border:2px solid #C8E6C9;}
.sb h4{font-size:15px;font-weight:800;margin-bottom:13px;}
.sb.old h4{color:#C62828;}
.sb.nw h4{color:#1B5E20;}
.sy{margin-bottom:11px;}
.sy .sl{font-size:10px;font-weight:700;color:var(--g500);letter-spacing:2px;}
.sy .st{font-size:13px;margin-top:3px;line-height:1.5;}
.mgnd{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px;margin-top:14px;}
.mn{background:var(--g50);border-radius:8px;padding:13px;border-left:4px solid var(--teal);}
.mn .ml{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:2px;margin-bottom:5px;}
.mn .mz{font-size:14px;font-weight:700;}
.mn .me{font-size:11px;color:var(--g500);margin-top:2px;}
@media(max-width:640px){
  .hd{padding:14px;}
  .hd-t{font-size:20px;}
  .home{padding:18px 14px;}
  .panel{padding:22px 16px;}
  .sim-br,.dgrid{grid-template-columns:1fr;}
  .fcrd{flex-direction:column;}
  .fm{min-width:unset;}
}
</style>
</head>
<body>
<div class="hd">
  <div>
    <div class="hd-t">Language <span>Upgrade</span> OS&nbsp;&nbsp;語言升維<span>作業系統</span></div>
    <div class="hd-s">語言 → 大腦模型 → 預測 → 決策 → 行動 → 人生結果&nbsp;&nbsp;|&nbsp;&nbsp;王欣蓉編制</div>
  </div>
  <button class="tts" onclick="speak('Language Upgrade OS — Transform your language, upgrade your brain model, and elevate your life results.',this,'INTRO')">🔊 INTRO</button>
</div>

<div class="home">
  <div class="hi">
    <h2>17 核心認知模組</h2>
    <p>點擊任一模組卡片，開啟深度內容&nbsp;&nbsp;Click any module card to explore</p>
  </div>
  <div class="flow-ban">
    語言<span class="ar">→</span>大腦模型<span class="ar">→</span>預測模型<span class="ar">→</span>決策模型<span class="ar">→</span>行為模型<span class="ar">→</span>人生結果
    <div class="sub">Language → Brain Model → Prediction → Decision → Action → Life Results</div>
  </div>
  <div class="mgrid" id="mgrid"></div>
</div>

<div class="ov" id="ov">
  <div class="panel" id="panel">
    <button class="pcl" onclick="closeP()">✕</button>
    <div class="ph">
      <div class="ph-num" id="pn"></div>
      <div class="ph-zh" id="pz"></div>
      <div class="ph-en" id="pe"></div>
    </div>
    <div id="pc"></div>
  </div>
</div>

<script>
// ── TTS ──────────────────────────────────────────────────────────
let spkBtn=null;
function speak(txt,btn,lbl){
  speechSynthesis.cancel();
  if(spkBtn){spkBtn.classList.remove('sp');spkBtn.innerHTML='🔊 '+(spkBtn.dataset.l||'SPEAK');spkBtn=null;}
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang.startsWith('en')&&x.name.includes('Samantha'))||vs.find(x=>x.lang.startsWith('en')&&x.localService);
  if(v)u.voice=v;
  if(btn){spkBtn=btn;btn.classList.add('sp');btn.dataset.l=lbl||'SPEAK';btn.innerHTML='⏸ STOP';}
  u.onend=()=>{if(btn){btn.classList.remove('sp');btn.innerHTML='🔊 '+(lbl||'SPEAK');spkBtn=null;}};
  speechSynthesis.speak(u);
}
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

// ── MODULES META ─────────────────────────────────────────────────
const MODS=[
  {id:1,zh:'語言掃描引擎',en:'Language Scanner Engine',desc:'掃描任何一句話，分析背後的大腦模型10維度',tag:'🤖 AI驅動',ai:true},
  {id:2,zh:'世界模型辨識',en:'World Model Identifier',desc:'判斷語言來自哪一種世界模型，共10種',tag:'📚 知識庫'},
  {id:3,zh:'限制信念資料庫',en:'Limiting Beliefs Database',desc:'限制信念 vs 更新信念精選對照庫',tag:'📊 資料庫'},
  {id:4,zh:'預測模型分析',en:'Predictive Model Analysis',desc:'AI分析你正在預測什麼、害怕什麼',tag:'🤖 AI驅動',ai:true},
  {id:5,zh:'語言生成器',en:'Language Level Generator',desc:'同一意思，11種不同維度的語言版本',tag:'⚡ 互動'},
  {id:6,zh:'人生診斷流程',en:'Life Diagnosis Flow',desc:'一句話 → 9階段AI深度診斷',tag:'🤖 AI驅動',ai:true},
  {id:7,zh:'模型壓縮器',en:'Model Compressor',desc:'任何文章/書籍 → 第一性原理精華',tag:'🤖 AI驅動',ai:true},
  {id:8,zh:'模型遷移',en:'Model Transfer Engine',desc:'同一模型套用到所有人生領域',tag:'🔄 遷移'},
  {id:9,zh:'人生模擬器',en:'Life Simulator',desc:'維持舊模型 vs 更新模型的未來對比',tag:'🎯 模擬'},
  {id:10,zh:'高維語言資料庫',en:'High-Dim Language Database',desc:'低維語言 vs 高維語言精選對照',tag:'📖 資料庫'},
  {id:11,zh:'智慧公式庫',en:'Wisdom Formula Library',desc:'人生核心方程式，精確白話解釋',tag:'🧮 公式'},
  {id:12,zh:'能力樹',en:'Capability Tree',desc:'10大核心能力 + 每項訓練方法',tag:'🌳 能力'},
  {id:13,zh:'每日升維',en:'Daily Upgrade',desc:'每日一套完整認知升級練習',tag:'📅 每日'},
  {id:14,zh:'人生知識圖譜',en:'Life Knowledge Graph',desc:'所有人生概念相互連結的知識網路',tag:'🕸 圖譜'},
  {id:15,zh:'知道→能力轉化',en:'Knowledge → Ability Ladder',desc:'10步把知識變成真正的能力',tag:'🪜 轉化'},
  {id:16,zh:'證據與推理模式',en:'Evidence & Reasoning Mode',desc:'區分事實、推論、假設、價值判斷',tag:'🔍 推理'},
  {id:17,zh:'語言顯微鏡',en:'Language Microscope',desc:'把一句話拆解成50個認知節點',tag:'🤖 AI驅動',ai:true},
];

function renderGrid(){
  document.getElementById('mgrid').innerHTML=MODS.map(m=>`
    <div class="mc" onclick="openM(${m.id})">
      <div class="mc-num">MODULE ${String(m.id).padStart(2,'0')}</div>
      <div class="mc-zh">${m.zh}</div>
      <div class="mc-en">${m.en}</div>
      <div class="mc-desc">${m.desc}</div>
      <span class="mc-tag${m.ai?' ai':''}">${m.tag}</span>
    </div>`).join('');
}

function openM(id){
  const m=MODS.find(x=>x.id===id);
  document.getElementById('pn').textContent=`MODULE ${String(id).padStart(2,'0')}`;
  document.getElementById('pz').textContent=m.zh;
  document.getElementById('pe').textContent=m.en;
  document.getElementById('pc').innerHTML=buildC(id);
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeP(){speechSynthesis.cancel();document.getElementById('ov').classList.remove('on');document.body.style.overflow='';}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeP();});

function tog(el){el.closest('.ex-item').classList.toggle('op');}
function togC(el){el.classList.toggle('op');}

// ── AI CALL ──────────────────────────────────────────────────────
async function aiCall(sys,msg,rid,ldg){
  const el=document.getElementById(rid);
  el.classList.add('on');
  el.innerHTML=`<h4>${ldg}</h4><div class="dots"><span></span><span></span><span></span></div>`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:msg}]})
    });
    const d=await r.json();
    const t=d.content?.map(c=>c.text||'').join('')||'請再試一次。';
    const safe=t.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    el.innerHTML=`<h4>✨ 分析完成 ANALYSIS COMPLETE</h4>
      <div style="line-height:1.9;font-size:13px;white-space:pre-wrap;">${safe}</div>
      <button class="tts" style="margin-top:14px;" onclick="speak(this.dataset.t,this,'READ')" data-t="${t.replace(/"/g,'&quot;').replace(/\n/g,' ')}">🔊 READ ALOUD</button>`;
  }catch(e){el.innerHTML=`<h4>⚠️ 錯誤</h4><p>網路錯誤，請再試。${e.message}</p>`;}
}

// ══════════════════════════════════════════════════════════════════
// MODULE BUILDERS
// ══════════════════════════════════════════════════════════════════
function buildC(id){
  const B={1:m1,2:m2,3:m3,4:m4,5:m5,6:m6,7:m7,8:m8,9:m9,10:m10,11:m11,12:m12,13:m13,14:m14,15:m15,16:m16,17:m17};
  return B[id]?B[id]():'<p>Coming soon.</p>';
}

// ── M1 Language Scanner ──────────────────────────────────────────
function m1(){
  const dims=[
    ['情緒 Emotion','The emotional signal encoded in the sentence — what feeling is being expressed or suppressed?'],
    ['身份 Identity','What identity does this sentence assume, reinforce, or threaten?'],
    ['需求 Need','What core human need is being expressed, suppressed, or denied?'],
    ['恐懼 Fear','What fear is driving the language? What outcome is being avoided?'],
    ['限制信念 Limiting Belief','What belief is capping the speaker\'s possibilities and options?'],
    ['預測模型 Prediction','What specific future is this sentence predicting? What outcome is expected?'],
    ['價值排序 Values','What does the word choice reveal about the speaker\'s deepest priorities?'],
    ['注意力焦點 Attention','Where is attention directed — problem or solution? Past or future?'],
    ['控制點 Locus of Control','Does the speaker believe they are the cause, or the effect, of their situation?'],
    ['世界模型 World Model','What kind of world does this sentence reveal — victim, growth, creation, fear?'],
  ];
  return `<p style="color:var(--g500);margin-bottom:18px;">APP不是分析句子，而是分析句子背後的大腦。<br><em>Not analyzing sentences — analyzing the brain that produced them.</em></p>
  <div class="ai-box">
    <label>輸入任何一句話 / Enter any sentence:</label>
    <textarea id="m1i" placeholder="例：我沒辦法，我就是這樣的人。"></textarea>
    <button class="ai-btn" onclick="rm1()">🔬 掃描語言 SCAN</button>
  </div>
  <div class="ai-res" id="m1r"></div>
  <h3 style="margin:24px 0 13px;color:var(--navy);">10個掃描維度</h3>
  ${dims.map(([z,e])=>`<div class="ex-item"><div class="ex-hd" onclick="tog(this)"><span>${z}</span><span class="ex-ar">▶</span></div>
    <div class="ex-bd"><button class="tts" onclick="speak('${e.replace(/'/g,"\\'")}',this,'PLAY')">🔊 PLAY</button>
    <p style="font-size:13px;color:var(--g500);margin-top:9px;line-height:1.7;">${e}</p></div></div>`).join('')}`;
}
function rm1(){const v=document.getElementById('m1i').value.trim();if(!v)return alert('請輸入一句話');
  aiCall(`You are a Language Upgrade OS cognitive analyst. Analyze the sentence through 10 dimensions with ▶ before each name. For each: label in Chinese+English, 2-3 sentences analysis in Traditional Chinese, one English insight. Dimensions: Emotion, Identity, Need, Fear, Limiting Belief, Prediction, Values, Attention, Locus of Control, World Model.`,`分析：「${v}」`,'m1r','🔬 掃描中 SCANNING...');}

// ── M2 World Models ──────────────────────────────────────────────
function m2(){
  const W=[
    {i:'😢',z:'受害者模型',e:'Victim Model',c:'#FFEBEE',
